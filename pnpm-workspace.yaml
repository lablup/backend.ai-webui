# Dependencies hard-link into a global store outside this repo
# (e.g. `~/Library/pnpm/store/v11/...`). `react/vite.config.ts` extends
# `server.fs.allow` with `pnpm store path` so Vite can serve assets from
# the store; do not remove that extension without also reverting this flag.
enableGlobalVirtualStore: true

minimumReleaseAge: 10080

# Exclude packages that must be installable before they age out of the
# `minimumReleaseAge` quarantine. Remove entries once they exceed 7 days.
minimumReleaseAgeExclude:
  - react@19.2.6
  - react-dom@19.2.6
minimumReleaseAgeIgnoreMissingTime: false
resolutionMode: time-based

allowBuilds:
  bufferutil: true
  core-js: true
  core-js-pure: true
  electron: true
  es5-ext: true
  esbuild: true
  sharp: true
  unrs-resolver: true
  utf-8-validate: true

overrides:
  tar-fs@2: 2.1.4
  # Build-tooling override. `@electron/packager` and `electron`'s own
  # install.js both extract their downloaded ZIPs via `extract-zip` → `yauzl`.
  # yauzl 2.10.0 extracts only the first entry and then lets the process exit
  # 0 with no error on Node >= 24.16.0 / >= 26.1.0, so desktop packaging
  # produces no app bundle and the Makefile fails later at the misleading
  # `mv`/`zip` step (build_mac + build_desktop, since CI's `.nvmrc: 24` floated
  # 24.15.0 -> 24.16.0). yauzl >= 3.3.1 fixes the silent extraction failure.
  # See electron/electron#51619 (#51623). Remove once extract-zip ranges to
  # yauzl >= 3.3.1 on its own.
  yauzl: ^3.3.1
  # Runtime security overrides — FR-3014. Pin transitive deps that end up in
  # the production bundle to the first Dependabot-recommended patched
  # version. Remove an entry when every upstream consumer ranges to the
  # patched version on its own.
  js-cookie: ^3.0.7 # GHSA-… prototype hijack (alert #385)
  mermaid: ^11.15.0 # HTML/CSS injection + DoS (alerts #379–382)
  serialize-javascript: ^7.0.5 # RCE via RegExp.flags, CPU DoS (#279, #386)
  "uuid@^11": ^11.1.1 # buffer bounds check (#387) v11 line
  "uuid@^13": ^13.0.1 # buffer bounds check (#374) — @lobehub/ui pulls 13.0.0
  dompurify: ^3.4.12 # align transitives with catalog bump
  # Dev-only transitive security overrides — FR-3014. These ship only in
  # dev/build tooling (not the production bundle), but Dependabot still
  # surfaces them. Remove an entry when every upstream consumer ranges to
  # the patched version on its own.
  qs: ^6.15.2 # crash on null in comma-format arrays (alert #388)
  "@babel/plugin-transform-modules-systemjs": ^7.29.4 # arbitrary code on malicious input (#378 high)
  "fast-uri@^3": ^3.1.2 # host confusion + path traversal (#376, #377 high)
  postcss: ^8.5.10 # XSS via unescaped </style> (#372)
  "@xmldom/xmldom": ^0.8.13 # XML injection (#318, #368, #369, #371 high)
  "picomatch@^2": ^2.3.2 # method injection in POSIX char classes (#296)
  "picomatch@^4": ^4.0.4 # same (#294)
  "minimatch@^3": ^3.1.4 # ReDoS (#267, #274, #278 high)
  "js-yaml@^4": ^4.1.1 # prototype pollution in merge (#226)
  "flatted@^3": ^3.4.2 # prototype pollution via parse() (#291 high)
  "yaml@^1": ^1.10.3 # stack overflow on deeply nested YAML (#292)
  lodash: ^4.18.0 # _.template RCE + _.unset prototype pollution (#321, #322 high)

patchedDependencies:
  "@cloudscape-design/board-components@3.0.176": react/patches/@cloudscape-design__board-components@3.0.176.patch
