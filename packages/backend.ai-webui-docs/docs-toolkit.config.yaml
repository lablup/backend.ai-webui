# docs-toolkit configuration for Backend.AI WebUI User Guide
# Engine provided by backend.ai-docs-toolkit

title: "Backend.AI WebUI User Guide"
company: "Lablup Inc."

# Logo (SVG file relative to project root)
logoPath: "../../manifest/backend.ai-brand-simple.svg"

# Source and output directories
srcDir: "src"
distDir: "dist"

# Version source (relative to project root)
versionSource: "../../package.json"

# Languages
languageLabels:
  en: "English"
  ko: "한국어"
  ja: "日本語"
  th: "ภาษาไทย"

# PDF settings
pdfFilenameTemplate: "Backend.AI_WebUI_User_Guide_{version}_{lang}.pdf"
pdfMetadata:
  author: "Lablup Inc."
  subject: "Backend.AI WebUI User Guide"
  creator: "Backend.AI Docs PDF Generator"

# Versions (FR-2729 multi-version deployment).
# - 26.4: archived release (FR-2738 creates the docs-archive/26.4 branch)
# - next: workspace tip; rebuilt on every commit
# Exactly one entry must carry `latest: true`.
# Per FR-2710 F6, version labels are minor-only (no patch); the literal
# label `next` is the only non-numeric value allowed and must pair with
# `source.kind: workspace`.
# `pdfTag` (optional, FR-2731) pins to a GitHub Release tag whose
# assets are linked from the per-language landing page (FR-2732).
#
# Release procedure (when cutting a new minor X.Y):
#   1. Insert a new entry ABOVE the `next` entry with
#        label: "X.Y"
#        source: { kind: archive-branch, ref: docs-archive/X.Y }
#        pdfTag: "vX.Y.Z"   # highest patch in the minor
#   2. Move `latest: true` onto the new entry; remove it from the prior one.
#   3. Leave the `next` entry last; it never carries `latest: true`.
#   See the docs release runbook for the full procedure.
versions:
  - label: "26.4"
    source:
      kind: archive-branch
      ref: docs-archive/26.4
    latest: true
    pdfTag: "v26.4.7"
  - label: "next"
    source:
      kind: workspace

# Product name for log messages
productName: "Backend.AI WebUI Docs"

# Website generation settings
website:
  editBaseUrl: "https://github.com/lablup/backend.ai-webui/edit/main/packages/backend.ai-webui-docs/src"
  repoUrl: "https://github.com/lablup/backend.ai-webui"

# Branding overrides for the web build (FR-2726).
# Lets consumers tune the topbar logo, sub-label, and primary color
# without forking the toolkit. All fields are optional; omitted fields
# fall back to Backend.AI defaults.
#
# - primaryColor: defaults to #FF7A00 (Backend.AI Orange)
# - logoLight / logoDark: SVG paths (project-root relative)
# - subLabel: per-language map (or single string). Used in Phase 2's
#   topbar to render text next to the logo (e.g. "Manual" / "매뉴얼").
branding:
  primaryColor: "#FF7A00"
  logoLight: "../../manifest/backend.ai-webui-black.svg"
  logoDark: "../../manifest/backend.ai-webui-white.svg"
  subLabel:
    en: "Manual"
    ko: "매뉴얼"
    ja: "マニュアル"
    th: "คู่มือ"

# Code-block presentation (F4 — Shiki syntax highlighting).
# FR-2726 Phase 3 paints code blocks with a BAI dark frame, so the
# Shiki theme is set to `github-dark` here so token colors read on
# the dark surface. Switch back to `github-light` (or any bundled
# theme) if your design needs light code blocks instead.
code:
  lightTheme: "github-dark"

# Agent configuration (for 'docs-toolkit agents' command)
agents:
  projectTitle: "Backend.AI WebUI"
  docsRoot: "."
  languages:
    - code: en
      label: English
    - code: ja
      label: Japanese
    - code: ko
      label: Korean
    - code: th
      label: Thai
  i18nPaths:
    en: "../../resources/i18n/en.json"
    ko: "../../resources/i18n/ko.json"
    ja: "../../resources/i18n/ja.json"
    th: "../../resources/i18n/th.json"
  terminologyFile: "TERMINOLOGY.md"
  styleGuideFile: "DOCUMENTATION-STYLE-GUIDE.md"
  translationGuideFile: "TRANSLATION-GUIDE.md"
  screenshotGuideFile: "SCREENSHOT-GUIDELINES.md"
  app:
    baseUrl: "http://localhost:9081"
    routes:
      - path: "/summary"
        name: "Summary"
      - path: "/job"
        name: "Sessions"
      - path: "/data"
        name: "Data (Storage Folders)"
      - path: "/serving"
        name: "Model Serving"
      - path: "/statistics"
        name: "Statistics"
      - path: "/usersettings"
        name: "User Settings"
      - path: "/credential"
        name: "Credentials (Admin)"
      - path: "/environment"
        name: "Environments (Admin)"
      - path: "/agent"
        name: "Resources (Admin)"
    loginInstructions: |
      1. Navigate to the app URL
      2. Enter credentials from E2E_USER and E2E_PASSWORD environment variables
      3. Click the Sign In button
    envVars:
      - E2E_USER
      - E2E_PASSWORD
