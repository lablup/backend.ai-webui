<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="docs-toolkit logo">
  <!-- Two stacked pages, the front offset slightly forward to imply depth.
       Dark fill so the logo reads cleanly on either light or dark site themes;
       a single Backend.AI orange accent keeps a subtle tie to the platform. -->
  <rect x="16" y="8" width="34" height="46" rx="3" fill="#cbd5e1"/>
  <rect x="10" y="14" width="34" height="46" rx="3" fill="#1f2937"/>
  <!-- text-line marks on the front page -->
  <rect x="16" y="22" width="22" height="2" rx="1" fill="#94a3b8"/>
  <rect x="16" y="28" width="22" height="2" rx="1" fill="#94a3b8"/>
  <rect x="16" y="34" width="16" height="2" rx="1" fill="#94a3b8"/>
  <rect x="16" y="40" width="20" height="2" rx="1" fill="#94a3b8"/>
  <rect x="16" y="46" width="14" height="2" rx="1" fill="#94a3b8"/>
  <!-- Backend.AI orange accent dot — references the dot on `.AI` in the
       parent brand mark. -->
  <circle cx="46" cy="14" r="3.5" fill="#FF9D00"/>
</svg>
