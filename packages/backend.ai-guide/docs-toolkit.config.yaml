title: "Backend.AI Complete Guide"
company: "Lablup Inc."
logoPath: "../../manifest/backend.ai-brand-simple.svg"
srcDir: "src"
distDir: "dist"
versionSource: "../../package.json"

languageLabels:
  en: "English"
  ko: "한국어"
  ja: "日本語"
  th: "ภาษาไทย"

pdfFilenameTemplate: "Backend.AI_Complete_Guide_{version}_{lang}.pdf"
pdfMetadata:
  author: "Lablup Inc."
  subject: "Backend.AI Complete Guide"
  creator: "Backend.AI Docs PDF Generator"

productName: "Backend.AI Guide"

agents:
  projectTitle: "Backend.AI Complete Guide"
  docsRoot: "."
  languages:
    - code: en
      label: English
    - code: ko
      label: Korean
    - code: ja
      label: Japanese
    - code: th
      label: Thai
  i18nPaths:
    en: "../../resources/i18n/en.json"
    ko: "../../resources/i18n/ko.json"
    ja: "../../resources/i18n/ja.json"
    th: "../../resources/i18n/th.json"
  terminologyFile: "TERMINOLOGY.md"
  styleGuideFile: "DOCUMENTATION-STYLE-GUIDE.md"
  translationGuideFile: "TRANSLATION-GUIDE.md"
  screenshotGuideFile: "SCREENSHOT-GUIDELINES.md"
  app:
    baseUrl: "http://localhost:9081"
    routes:
      - path: "/summary"
        name: "Summary"
      - path: "/job"
        name: "Sessions"
      - path: "/data"
        name: "Data (Storage Folders)"
      - path: "/serving"
        name: "Model Serving"
    loginInstructions: |
      1. Navigate to the app URL
      2. Enter credentials from E2E_USER and E2E_PASSWORD environment variables
      3. Click the Sign In button
    envVars:
      - E2E_USER
      - E2E_PASSWORD