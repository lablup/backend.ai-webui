name: Weekly merge of branch lockfiles into main

on:
  schedule:
    # Every Monday at 08:00 KST (Sunday 23:00 UTC)
    - cron: "0 23 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-branch-lockfiles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Merge branch lockfiles into pnpm-lock.yaml
        run: pnpm install --merge-git-branch-lockfiles --no-frozen-lockfile --config.minimum-release-age=0

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/weekly-merge-branch-lockfiles
          base: main
          commit-message: "chore: weekly merge of branch lockfiles into main"
          title: "chore: weekly merge of branch lockfiles into main"
          body: |
            Weekly automated merge of branch-specific pnpm lockfiles into the root `pnpm-lock.yaml` on `main`.

            Generated by `.github/workflows/weekly-merge-branch-lockfiles.yml` via `pnpm install --merge-git-branch-lockfiles`.

            Review the lockfile diff carefully before merging — branch lockfiles are intentionally isolated from main (see FR-2747), so this consolidation is opt-in and should only be merged when the resulting state is known to be healthy.
          labels: |
            chore
          delete-branch: true
          add-paths: |
            pnpm-lock.yaml
            pnpm-lock.*.yaml
